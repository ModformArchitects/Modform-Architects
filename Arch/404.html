<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Ecoline Architects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg:     #0d0d0b;
      --fg:     #f5f2ec;
      --muted:  #b8b0a4;
      --accent: #c8a96e;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'DM Sans', system-ui, sans-serif;
    }
    [data-theme="light"] {
      --bg:     #f7f4ef;
      --fg:     #1a1916;
      --muted:  #7a7268;
      --accent: #b8923a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      transition: background .4s, color .4s;
    }
    a { color: inherit; text-decoration: none; }

    .err-num {
      font-family: var(--serif);
      font-size: clamp(6rem, 25vw, 14rem);
      font-weight: 300;
      line-height: 1;
      color: rgba(200,169,110,0.15);
      letter-spacing: -.02em;
      user-select: none;
    }
    .err-title {
      font-family: var(--serif);
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 300;
      margin-top: -1rem;
      margin-bottom: 1rem;
    }
    .err-title em { color: var(--accent); font-style: italic; }
    .err-sub {
      font-size: .9rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 380px;
      margin-bottom: 2.5rem;
    }
    .err-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .err-btn {
      padding: .75rem 1.75rem;
      border-radius: 2px;
      font-family: var(--sans);
      font-size: .85rem;
      letter-spacing: .06em;
      cursor: pointer;
      transition: opacity .2s, transform .2s;
    }
    .err-btn:hover { opacity: .85; transform: translateY(-1px); }
    .err-btn-primary {
      background: var(--accent);
      color: #111;
      border: none;
    }
    .err-btn-outline {
      background: transparent;
      color: var(--fg);
      border: 1px solid rgba(255,255,255,0.15);
    }
    [data-theme="light"] .err-btn-outline { border-color: rgba(0,0,0,0.15); }
    .err-logo {
      position: fixed;
      top: 1.5rem; left: 2rem;
      font-family: var(--serif);
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: .25em;
      color: var(--fg);
    }
    .err-logo em { font-style: normal; color: var(--accent); }
  </style>
</head>
<body>
  <a class="err-logo" href="index.html">Ar.<em>Shrishtika</em></a>

  <p class="err-num">404</p>
  <h1 class="err-title">This space is <em>unbuilt.</em></h1>
  <p class="err-sub">The page you're looking for doesn't exist — it may have been moved or the link is incorrect.</p>

  <div class="err-actions">
    <a href="index.html" class="err-btn err-btn-primary">Back to Home</a>
    <a href="index.html#contact" class="err-btn err-btn-outline">Contact Us</a>
  </div>

  <script>
    var saved = localStorage.getItem('arshristika-theme') || 'dark';
    document.documentElement.dataset.theme = saved;
  </script>
</body>
</html>
